name: Deploy to Server

on:
  push:
    branches:
      - main  # Burayı kullandığınız ana branch adı (main veya master) yapın

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploying to VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # pg_dump için postgresql-client kurulu değilse kur
            if ! command -v pg_dump &> /dev/null; then
              apt-get install -y postgresql-client -q
            fi

            cd /root/kiralama_projesi_v4
            git pull origin main
            source venv/bin/activate
            pip install -r requirements.txt

            # Tablolar yoksa veya firma tablosu boşsa SQLite → PostgreSQL migration çalıştır
            FIRMA_COUNT=$(psql "$DATABASE_URL" -t -c "SELECT COUNT(*) FROM firma;" 2>/dev/null | tr -d ' \n' || echo "0")
            if [ -z "$FIRMA_COUNT" ]; then FIRMA_COUNT=0; fi
            echo ">>> PostgreSQL firma kayit sayisi: $FIRMA_COUNT"
            if [ "$FIRMA_COUNT" -eq "0" ]; then
              echo ">>> Veritabani bos, migration baslatiliyor..."
              sqlite3 app.db < yedek_db.sql
              python migrate_sqlite_to_pg.py
              rm -f app.db
              echo ">>> Migration tamamlandi."
            else
              echo ">>> Veritabaninda veri var, migration atlandi."
            fi

            systemctl restart kiralama_test.service