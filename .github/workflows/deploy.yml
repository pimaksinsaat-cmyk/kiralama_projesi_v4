name: Deploy to Server

on:
  push:
    branches:
      - main  # Burayı kullandığınız ana branch adı (main veya master) yapın

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploying to VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /root/kiralama_projesi_v4
            git pull origin main
            source venv/bin/activate
            pip install -r requirements.txt
            export FLASK_APP=run.py

            SERVICE_ENV=$(systemctl show kiralama_v4.service -p Environment --value)
            export SECRET_KEY=$(printf '%s\n' "$SERVICE_ENV" | tr ' ' '\n' | sed -n 's/^SECRET_KEY=//p')
            export DATABASE_URL=$(printf '%s\n' "$SERVICE_ENV" | tr ' ' '\n' | sed -n 's/^DATABASE_URL=//p')

            if [ -z "$DATABASE_URL" ]; then
              echo ">>> DATABASE_URL bulunamadi"
              exit 1
            fi

            python -m flask db upgrade

            systemctl restart kiralama_v4.service
            systemctl restart kiralama_test.service