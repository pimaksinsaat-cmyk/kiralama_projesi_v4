services:
  web:
    build: .
    container_name: kiralama_web
    restart: unless-stopped
    command: gunicorn --worker-class gthread --workers 1 --threads 4 --timeout 90 --graceful-timeout 30 --keep-alive 5 --bind 0.0.0.0:10000 run:app
    ports:
      - "5000:10000"
    volumes:
      - .:/app
      - backups_data:/app/backups
    environment:
      - FLASK_APP=run.py
      - FLASK_CONFIG=production
      - DATABASE_URL=postgresql://postgres:gizlisifre@db:5432/kiralama_db
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set in local .env}
      - TEMPLATES_AUTO_RELOAD=true
      - DISABLE_STATIC_CACHE=true
    depends_on:
      db:
        condition: service_healthy

  scheduler:
    build: .
    container_name: kiralama_scheduler
    restart: unless-stopped
    command: python scheduler.py
    volumes:
      - .:/app
      - backups_data:/app/backups
    environment:
      - FLASK_CONFIG=production
      - DATABASE_URL=postgresql://postgres:gizlisifre@db:5432/kiralama_db
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set in local .env}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    container_name: kiralama_veritabani
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: gizlisifre
      POSTGRES_DB: kiralama_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kiralama_db"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  postgres_data:
  backups_data:
