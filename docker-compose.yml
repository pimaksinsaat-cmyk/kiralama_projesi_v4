version: '3.8'

services:
  web:
    build: .
    container_name: kiralama_web
    ports:
      - "5000:10000"
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql://postgres:gizlisifre@db:5432/kiralama_db
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    container_name: kiralama_veritabani
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: gizlisifre
      POSTGRES_DB: kiralama_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: